<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;


// ===== The Masters カラーパレット =====
// 深緑 #1a3a2a, ゴールド #c9a84c, アイボリー #f5f0e8, 濃紺背景 #0d1f14

const DEFAULT_PARS = [4,3,4,5,4,3,4,5,4,4,3,4,5,4,3,4,5,4];
const PLAYER_COLORS = ["#4ade80","#60a5fa","#f87171","#fbbf24"];
const PLAYER_ICONS  = ["🟢","🔵","🔴","🟡"];
const medals = ["🥇","🥈","🥉","4"];

function getTotal(s){ return s.reduce((a,b)=>b!==""?a+Number(b):a,0); }
function getRank(t){ const s=[...t].sort((a,b)=>a-b); return t.map(v=>s.indexOf(v)+1); }

// ===== スタイル定数 =====
const BG   = {background:"linear-gradient(160deg,#0d1f14 0%,#1a3a2a 50%,#0d1f14 100%)"};
const GOLD = "#c9a84c";
const IVORY= "#f5f0e8";
const DARK = "#0d1f14";
const CARD = {background:"rgba(255,255,255,0.05)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:16};
const CARD_GOLD = {background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.5)",borderRadius:16};
const gameFont = {fontFamily:"'M PLUS Rounded 1c', sans-serif", fontWeight:900};
const titleFont= {fontFamily:"'M PLUS Rounded 1c', sans-serif", fontWeight:900, letterSpacing:"0.12em"};

function GoldLine(){ return <div style={{height:1,background:`linear-gradient(90deg,transparent,${GOLD},transparent)`,margin:"12px 0"}}/>; }

function Btn({onClick,children,gold,small,disabled,outline}){
  const base={
    width:"100%", padding:small?"10px 16px":"16px", borderRadius:12, fontFamily:"'M PLUS Rounded 1c', sans-serif",
    fontSize:small?"12px":"14px", fontWeight:"bold", cursor:disabled?"not-allowed":"pointer",
    transition:"all 0.15s", border:"none", letterSpacing:"0.05em",
  };
  const style = gold
    ? {...base, background:disabled?"#444":`linear-gradient(135deg,${GOLD},#e8c56a,${GOLD})`, color:DARK, opacity:disabled?0.5:1}
    : outline
    ? {...base, background:"transparent", border:`1px solid rgba(201,168,76,0.4)`, color:IVORY}
    : {...base, background:"rgba(255,255,255,0.08)", color:IVORY};
  return <button style={style} onClick={onClick} disabled={disabled}>{children}</button>;
}

function App(){
  const [phase, setPhase]   = useState("course");
  const [cName, setCName]   = useState("");
  const [pars,  setPars]    = useState([...DEFAULT_PARS]);
  const [names, setNames]   = useState(["プレイヤー1","プレイヤー2","プレイヤー3","プレイヤー4"]);
  const [scores,setScores]  = useState(Array.from({length:4},()=>Array(18).fill("")));
  const [hole,  setHole]    = useState(0);
  // ポイント設定
  const [pts, setPts] = useState({
    p1: 3000, p2: 1000,
    np: 1500,
  });
  // 3位・4位は自動計算
  const p3 = -pts.p2;
  const p4 = -pts.p1;
  const npLose = Math.round(pts.np / 3);
  // nearpin[i] = 選んだプレイヤーindex (0-3) or null (該当なし選択) or undefined (未選択)
  const [nearpin, setNearpin] = useState({}); // { holeIndex: playerIndex | null }

  // Par3ホールの一覧（0-indexed）
  const par3Holes = pars.map((p,i)=>p===3?i:null).filter(i=>i!==null);

  // ニアピン賞計算
  // Par3を4ホールブロックとして持ち越し処理
  function calcNearpin(){
    const prizes = [0,0,0,0];
    let carry = 0;
    for(let idx=0; idx<par3Holes.length; idx++){
      const h = par3Holes[idx];
      const winner = nearpin[h];
      if(winner === undefined) continue;
      if(winner === null){
        if(idx === par3Holes.length-1){ /* 全て該当なし → ポイントなし */ }
        else carry++;
      } else {
        const mult = carry + 1;
        prizes[winner] += pts.np * mult;
        for(let pi=0;pi<4;pi++) if(pi!==winner) prizes[pi] -= npLose * mult;
        carry = 0;
      }
    }
    return prizes;
  }

  const nearpinPrizes = calcNearpin();

  const frontT = scores.map(s=>getTotal(s.slice(0,9)));
  const backT  = scores.map(s=>getTotal(s.slice(9)));
  const totalT = scores.map(s=>getTotal(s));
  const ranks  = getRank(totalT);
  const parF   = pars.slice(0,9).reduce((a,b)=>a+b,0);
  const parB   = pars.slice(9).reduce((a,b)=>a+b,0);
  const parTotal = parF+parB;

  function calcPrizes(totals){
    const s=[...totals].sort((a,b)=>a-b);
    if(s[0]===s[3]) return [0,0,0,0];
    const {p1,p2}=pts;
    const top3=s[0]===s[1]&&s[1]===s[2];
    const top2=!top3&&s[0]===s[1];
    const mid2=!top3&&!top2&&s[1]===s[2];
    const bot2=!top3&&!top2&&!mid2&&s[2]===s[3];
    const t = top3 ? [p1, p1, p1, -(p1*3)]
            : top2 ? [(p1+p2)/2, (p1+p2)/2, p3, p4]
            : mid2 ? [p1, (p2+p3)/2, (p2+p3)/2, p4]
            : bot2 ? [p1, p2, (p3+p4)/2, (p3+p4)/2]
            :        [p1, p2, p3, p4];
    return totals.map(v=>t[s.indexOf(v)]);
  }
  function sp(h,v){ setPars(p=>{const n=[...p];n[h]=Math.max(3,Math.min(5,parseInt(v)||4));return n;}); }
  function sc(pi,h,v){ const val=v===""?"":(Math.max(1,parseInt(v)||1)); setScores(p=>{const n=p.map(s=>[...s]);n[pi][h]=val;return n;}); }
  function pStr(v){ return v>0?`+${v.toLocaleString()}pt`:`${v.toLocaleString()}pt`; }
  function pCol(v){ return v>0?GOLD:v<0?"#f87171":"rgba(255,255,255,0.4)"; }

  const wrap = {minHeight:"100vh",...BG, padding:"0 0 40px 0"};
  const inner= {maxWidth:480,margin:"0 auto",padding:"0 16px"};

  function Logo({size="lg"}){
    const big = size==="lg";
    return (
      <div style={{textAlign:"center", marginBottom: big?24:12}}>
        <img src={LOGO_SRC} alt="PIN PON PAN"
          style={{width: big?"90%":"70%", maxWidth: big?360:260, height:"auto", display:"block", margin:"0 auto"}}/>
        {big && <div style={{...gameFont,fontSize:9,color:"rgba(245,240,232,0.35)",letterSpacing:"0.2em",marginTop:6}}>GOLF SCORE TRACKER</div>}
      </div>
    );
  }

  // ── COURSE ──
  if(phase==="course") return (
    <div style={wrap}>
      <div style={inner}>
        <div style={{paddingTop:40}}>
          <Logo size="lg"/>
        </div>

        <div style={{...CARD,padding:20,marginBottom:16}}>
          <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:12}}>◆ コース設定</div>
          <input value={cName} onChange={e=>setCName(e.target.value)} placeholder="コース名を入力"
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.3)`,borderRadius:8,
              padding:"10px 14px",color:IVORY,fontSize:14,outline:"none",boxSizing:"border-box",
              fontFamily:"'M PLUS Rounded 1c',sans-serif",marginBottom:16}}/>

          {[{label:"◀ FRONT 9（H1〜9）",range:[0,9]},{label:"▶ BACK 9（H10〜18）",range:[9,18]}].map(({label,range})=>(
            <div key={label} style={{marginBottom:14}}>
              <div style={{...gameFont,fontSize:10,color:"rgba(201,168,76,0.6)",marginBottom:8}}>{label}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {pars.slice(range[0],range[1]).map((p,i)=>{
                  const hi=range[0]+i;
                  const col=p===3?GOLD:p===5?"#60a5fa":IVORY;
                  return (
                    <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"monospace"}}>{hi+1}</span>
                      <select value={p} onChange={e=>sp(hi,e.target.value)}
                        style={{width:36,height:36,background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,
                          borderRadius:6,color:col,fontSize:13,textAlign:"center",fontFamily:"'M PLUS Rounded 1c',sans-serif",
                          fontWeight:"bold",outline:"none"}}>
                        <option value={3}>3</option><option value={4}>4</option><option value={5}>5</option>
                      </select>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{textAlign:"right",...gameFont,fontSize:10,color:"rgba(201,168,76,0.5)",marginTop:8}}>
            FRONT {parF} | BACK {parB} | TOTAL {parTotal}
          </div>
        </div>

        <Btn gold onClick={()=>setPhase("setup")}>次へ → プレイヤー設定</Btn>
      </div>
    </div>
  );

  // ── SETUP ──
  if(phase==="setup") return (
    <div style={wrap}>
      <div style={inner}>
        <div style={{paddingTop:40,paddingBottom:24}}>
          <button onClick={()=>setPhase("course")} style={{...gameFont,fontSize:10,color:"rgba(201,168,76,0.5)",background:"none",border:"none",cursor:"pointer",marginBottom:16}}>← コース設定に戻る</button>
          <Logo size="sm"/>
        </div>

        <div style={{...CARD,padding:20,marginBottom:20}}>
          <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:14}}>◆ プレイヤー登録</div>
          {names.map((name,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:20,width:28,textAlign:"center"}}>{PLAYER_ICONS[i]}</span>
              <input value={name} onChange={e=>setNames(p=>{const n=[...p];n[i]=e.target.value;return n;})}
                placeholder={`PLAYER ${i+1}`}
                style={{flex:1,background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,
                  padding:"10px 14px",color:PLAYER_COLORS[i],fontSize:13,outline:"none",
                  fontFamily:"'M PLUS Rounded 1c',sans-serif",boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>

        <div style={{...CARD,padding:20,marginBottom:20}}>
          <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:14}}>◆ ポイント設定</div>
          {[
            {key:"p1", label:"1位"},
            {key:"p2", label:"2位"},
            {key:"np", label:"ニアピン WIN"},
          ].map(({key,label})=>(
            <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{...gameFont,fontSize:11,color:"rgba(245,240,232,0.6)"}}>{label}</span>
              <input
                type="number"
                value={pts[key]}
                onChange={e=>setPts(p=>({...p,[key]:parseInt(e.target.value)||0}))}
                style={{width:100,background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,
                  borderRadius:8,padding:"8px 10px",color:pts[key]>=0?GOLD:"#f87171",fontSize:13,
                  outline:"none",textAlign:"right",fontFamily:"'M PLUS Rounded 1c',sans-serif",boxSizing:"border-box"}}
              />
            </div>
          ))}
          {[
            {label:"3位（自動）", val:p3},
            {label:"4位（自動）", val:p4},
            {label:"ニアピン LOSE（自動）", val:-npLose},
          ].map(({label,val})=>(
            <div key={label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,
              padding:"7px 10px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
              <span style={{...gameFont,fontSize:11,color:"rgba(245,240,232,0.3)"}}>{label}</span>
              <span style={{...gameFont,fontSize:11,color:"#f87171"}}>{val.toLocaleString()}pt</span>
            </div>
          ))}
        </div>

        <Btn gold onClick={()=>{setScores(Array.from({length:4},(_,pi)=>pars.map(p=>p)));setNearpin({});setHole(0);setPhase("playing");}}>
          ▶ ラウンド スタート
        </Btn>
      </div>
    </div>
  );

  // ── RESULT ──
  if(phase==="result"){
    const fP=calcPrizes(frontT), bP=calcPrizes(backT), tP=calcPrizes(totalT);
    const nP=nearpinPrizes;
    const grand=Array.from({length:4},(_,i)=>fP[i]+bP[i]+tP[i]+nP[i]);
    const byGrand=[...Array(4).keys()].sort((a,b)=>grand[b]-grand[a]);
    const sections=[{label:"FRONT 9",sc:frontT,pr:fP},{label:"BACK 9",sc:backT,pr:bP},{label:"TOTAL",sc:totalT,pr:tP}];
    // ニアピン賞の表示用
    const nearpinRows = par3Holes.map((h,idx)=>{
      const winner = nearpin[h];
      // 持ち越し倍率を計算
      let mult = 1;
      for(let j=idx-1;j>=0;j--){
        if(nearpin[par3Holes[j]]===null) mult++; else break;
      }
      // 実際に持ち越しが有効なのは連続nullの後
      let m2 = 1;
      for(let j=idx-1;j>=0;j--){
        if(nearpin[par3Holes[j]]===null) m2++; else { m2=1+idx-j-1; break; }
      }
      // シンプルに再計算
      let carry2=0;
      for(let j=0;j<idx;j++){
        if(nearpin[par3Holes[j]]===null) carry2++;
        else carry2=0;
      }
      const multiplier = carry2+1;
      return {holeNum:h+1, winner, multiplier};
    });
    return (
      <div style={wrap}>
        <div style={inner}>
          <div style={{paddingTop:32}}>
            <Logo size="sm"/>
          </div>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:40,marginBottom:6}}>🏆</div>
            <div style={{...titleFont,fontSize:16,color:GOLD,marginBottom:4}}>FINAL RESULT</div>
            <div style={{...gameFont,fontSize:10,color:"rgba(245,240,232,0.4)"}}>{cName||"コース"} | PAR {parTotal}</div>
            <GoldLine/>
          </div>

          {sections.map(({label,sc,pr})=>{
            const si=[...Array(4).keys()].sort((a,b)=>sc[a]-sc[b]);
            return (
              <div key={label} style={{...CARD,padding:16,marginBottom:12}}>
                <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:12}}>◆ {label}</div>
                {si.map((pi,rank)=>(
                  <div key={pi} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:rank<3?"1px solid rgba(201,168,76,0.1)":"none"}}>
                    <span style={{fontSize:16,width:28,textAlign:"center"}}>{medals[rank]==="4"?"4th":medals[rank]}</span>
                    <span style={{fontSize:18}}>{PLAYER_ICONS[pi]}</span>
                    <span style={{flex:1,...gameFont,fontSize:12,color:PLAYER_COLORS[pi]}}>{names[pi]}</span>
                    <span style={{...gameFont,fontSize:12,color:"rgba(255,255,255,0.5)",width:28,textAlign:"right"}}>{sc[pi]||"-"}</span>
                    <span style={{...gameFont,fontSize:12,color:pCol(pr[pi]),width:100,textAlign:"right",fontWeight:"bold"}}>{pStr(pr[pi])}</span>
                  </div>
                ))}
              </div>
            );
          })}

          {/* ニアピン賞 */}
          <div style={{...CARD,padding:16,marginBottom:12}}>
            <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:12}}>◆ NEARPIN</div>
            {nearpinRows.map(({holeNum,winner,multiplier})=>(
              <div key={holeNum} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(201,168,76,0.08)"}}>
                <span style={{...gameFont,fontSize:10,color:"rgba(255,255,255,0.4)",width:52}}>HOLE {holeNum}</span>
                {multiplier>1&&<span style={{...gameFont,fontSize:9,color:"#f87171",background:"rgba(248,113,113,0.1)",
                  border:"1px solid rgba(248,113,113,0.3)",borderRadius:4,padding:"2px 6px"}}>×{multiplier}</span>}
                {winner===undefined
                  ? <span style={{...gameFont,fontSize:10,color:"rgba(255,255,255,0.2)"}}>未入力</span>
                  : winner===null
                  ? <span style={{...gameFont,fontSize:10,color:"rgba(255,255,255,0.35)"}}>該当なし → 持ち越し</span>
                  : <>
                      <span style={{fontSize:16}}>{PLAYER_ICONS[winner]}</span>
                      <span style={{...gameFont,fontSize:11,color:PLAYER_COLORS[winner]}}>{names[winner]}</span>
                      <span style={{...gameFont,fontSize:11,color:GOLD,marginLeft:"auto"}}>+{(pts.np*multiplier).toLocaleString()}pt</span>
                    </>
                }
              </div>
            ))}
            <div style={{marginTop:12}}>
              {Array.from({length:4},(_,pi)=>nP[pi]!==0&&(
                <div key={pi} style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}>
                  <span style={{...gameFont,fontSize:11,color:PLAYER_COLORS[pi]}}>{PLAYER_ICONS[pi]} {names[pi]}</span>
                  <span style={{...gameFont,fontSize:11,color:pCol(nP[pi]),fontWeight:"bold"}}>{pStr(nP[pi])}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{...CARD_GOLD,padding:20,marginBottom:24}}>
            <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.2em",marginBottom:14}}>◆ POINT TOTAL</div>
            {byGrand.map((pi,rank)=>(
              <div key={pi} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,marginBottom:6,
                background:rank===0?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)"}}>
                <span style={{fontSize:rank===0?24:18,width:32,textAlign:"center"}}>{["🥇","🥈","🥉","4"][rank]}</span>
                <span style={{fontSize:18}}>{PLAYER_ICONS[pi]}</span>
                <span style={{flex:1,...gameFont,fontSize:13,color:PLAYER_COLORS[pi]}}>{names[pi]}</span>
                <div style={{textAlign:"right"}}>
                  <div style={{...gameFont,fontSize:16,color:pCol(grand[pi]),fontWeight:"bold"}}>{pStr(grand[pi])}</div>
                  <div style={{...gameFont,fontSize:9,color:"rgba(255,255,255,0.3)"}}>
                    {pStr(fP[pi])} / {pStr(bP[pi])} / {pStr(tP[pi])} / NP:{pStr(nP[pi])}
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}><Btn outline onClick={()=>setPhase("playing")}>← スコア入力</Btn></div>
            <div style={{flex:1}}><Btn gold onClick={()=>{setScores(Array.from({length:4},()=>pars.map(p=>p)));setNearpin({});setPhase("course");setHole(0);}}>もう一度</Btn></div>
          </div>
        </div>
      </div>
    );
  }

  // ── PLAYING ──
  const par = pars[hole];
  const isHalf = hole<9?"FRONT":"BACK";
  return (
    <div style={{...wrap,paddingBottom:0}}>
      {/* ヘッダー */}
      <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(13,31,20,0.95)",backdropFilter:"blur(12px)",
        borderBottom:`1px solid rgba(201,168,76,0.2)`,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{...gameFont,fontSize:9,color:"rgba(201,168,76,0.6)",marginBottom:3}}>{isHalf} · {cName||"コース"}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:10}}>
            <span style={{...gameFont,fontSize:20,color:IVORY}}>HOLE {hole+1}</span>
            <span style={{...gameFont,fontSize:11,color:`rgba(201,168,76,0.7)`}}>PAR {par}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setPhase("course")}
            style={{...gameFont,fontSize:10,background:"rgba(255,255,255,0.08)",color:"rgba(201,168,76,0.7)",
              border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,padding:"8px 12px",cursor:"pointer"}}>
            ← 設定
          </button>
          <button onClick={()=>setPhase("result")}
            style={{...gameFont,fontSize:10,background:`linear-gradient(135deg,${GOLD},#e8c56a)`,color:DARK,border:"none",
              borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:"bold"}}>
            結果 →
          </button>
        </div>
      </div>

      <div style={{...inner,paddingTop:16}}>
        {/* ホールナビ */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:16}}>
          {Array.from({length:18},(_,i)=>{
            const isCur=i===hole;
            const edited=scores.some((s,pi)=>s[i]!==pars[i]) || (pars[i]===3 && nearpin[i]!==undefined);
            return (
              <button key={i} onClick={()=>setHole(i)}
                style={{width:32,height:32,borderRadius:6,fontSize:11,fontWeight:"bold",cursor:"pointer",
                  fontFamily:"'M PLUS Rounded 1c',sans-serif",border:"none",transition:"all 0.15s",
                  marginLeft:i===9?8:0,
                  background:isCur?`linear-gradient(135deg,${GOLD},#e8c56a)`:edited?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.06)",
                  color:isCur?DARK:edited?GOLD:"rgba(255,255,255,0.35)",
                  transform:isCur?"scale(1.15)":"scale(1)"}}>
                {i+1}
              </button>
            );
          })}
        </div>

        {/* スコア入力 */}
        <div style={{...CARD,padding:16,marginBottom:14}}>
          <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:14}}>◆ スコア入力</div>
          {Array.from({length:4},(_,pi)=>{
            const val=scores[pi][hole];
            const diff=val!==""?Number(val)-par:null;
            const badgeInfo=diff===null?null:
              diff<=-2?{label:"EAGLE↓",bg:"rgba(201,168,76,0.25)",col:GOLD}:
              diff===-1?{label:"BIRDIE",bg:"rgba(239,68,68,0.25)",col:"#f87171"}:
              diff===0?{label:"PAR",bg:"rgba(255,255,255,0.1)",col:IVORY}:
              diff===1?{label:"BOGEY",bg:"rgba(96,165,250,0.2)",col:"#93c5fd"}:
              diff===2?{label:"DBL",bg:"rgba(59,130,246,0.2)",col:"#60a5fa"}:
              {label:`+${diff}`,bg:"rgba(30,58,138,0.3)",col:"#818cf8"};
            return (
              <div key={pi} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:pi<3?"1px solid rgba(201,168,76,0.08)":"none"}}>
                <span style={{fontSize:18,width:26}}>{PLAYER_ICONS[pi]}</span>
                <span style={{flex:1,...gameFont,fontSize:12,color:PLAYER_COLORS[pi]}}>{names[pi]}</span>
                {badgeInfo&&<span style={{...gameFont,fontSize:9,padding:"3px 7px",borderRadius:20,
                  background:badgeInfo.bg,color:badgeInfo.col,border:`1px solid ${badgeInfo.col}40`}}>{badgeInfo.label}</span>}
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>sc(pi,hole,val===""?par-1:Math.max(1,Number(val)-1))}
                    style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.08)",
                      border:`1px solid rgba(201,168,76,0.2)`,color:IVORY,fontSize:18,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <span style={{width:28,textAlign:"center",...gameFont,fontSize:18,color:val===""?"rgba(255,255,255,0.2)":IVORY,fontWeight:"bold"}}>{val||"-"}</span>
                  <button onClick={()=>sc(pi,hole,val===""?par+1:Number(val)+1)}
                    style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.08)",
                      border:`1px solid rgba(201,168,76,0.2)`,color:IVORY,fontSize:18,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>
            );
          })}
        </div>

        {/* ニアピン選択（Par3のみ） */}
        {par===3&&(()=>{
          const selected = nearpin[hole];
          // 持ち越し倍率
          const hIdx = par3Holes.indexOf(hole);
          let carry=0;
          for(let j=hIdx-1;j>=0;j--){
            if(nearpin[par3Holes[j]]===null) carry++; else break;
          }
          const mult=carry+1;
          return (
            <div style={{...CARD_GOLD,padding:16,marginBottom:14}}>
              <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:4}}>
                ◆ NEARPIN {mult>1?`× ${mult} (持ち越し${carry}回)`:""}
              </div>
              <div style={{...gameFont,fontSize:9,color:"rgba(255,255,255,0.35)",marginBottom:12}}>
                WIN: +{(pts.np*mult).toLocaleString()}pt / LOSE: -{(npLose*mult).toLocaleString()}pt（均等負担）
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {Array.from({length:4},(_,pi)=>{
                  const isSel = selected===pi;
                  return (
                    <button key={pi} onClick={()=>setNearpin(p=>({...p,[hole]:isSel?undefined:pi}))}
                      style={{flex:1,minWidth:60,padding:"10px 4px",borderRadius:10,cursor:"pointer",
                        border:`2px solid ${isSel?PLAYER_COLORS[pi]:"rgba(255,255,255,0.1)"}`,
                        background:isSel?`${PLAYER_COLORS[pi]}22`:"rgba(255,255,255,0.04)",
                        display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.15s"}}>
                      <span style={{fontSize:20}}>{PLAYER_ICONS[pi]}</span>
                      <span style={{...gameFont,fontSize:9,color:isSel?PLAYER_COLORS[pi]:"rgba(255,255,255,0.4)"}}>{names[pi].slice(0,4)}</span>
                    </button>
                  );
                })}
              </div>
              <button onClick={()=>setNearpin(p=>({...p,[hole]:selected===null?undefined:null}))}
                style={{width:"100%",marginTop:10,padding:"8px",borderRadius:8,cursor:"pointer",
                  border:`1px solid ${selected===null?"rgba(248,113,113,0.6)":"rgba(255,255,255,0.1)"}`,
                  background:selected===null?"rgba(248,113,113,0.1)":"rgba(255,255,255,0.03)",
                  ...gameFont,fontSize:10,color:selected===null?"#f87171":"rgba(255,255,255,0.35)"}}>
                該当なし（持ち越し）
              </button>
            </div>
          );
        })()}

        {/* 前後ホール */}
        <div style={{display:"flex",gap:10,marginBottom:14}}>
          <div style={{flex:1}}><Btn outline disabled={hole===0} onClick={()=>setHole(h=>Math.max(0,h-1))}>← PREV</Btn></div>
          <div style={{flex:1}}><Btn gold onClick={()=>{if(hole<17)setHole(h=>h+1);else setPhase("result");}}>
            {hole<17?"NEXT →":"RESULT 🏆"}
          </Btn></div>
        </div>

        {/* 現在スコア */}
        <div style={{...CARD,padding:14,marginBottom:24}}>
          <div style={{...gameFont,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:10}}>◆ 現在のスコア</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 48px 48px 56px",gap:4,marginBottom:6}}>
            {["","FRONT","BACK","TOTAL"].map(h=>(
              <div key={h} style={{...gameFont,fontSize:9,color:"rgba(255,255,255,0.3)",textAlign:h?"center":"left"}}>{h}</div>
            ))}
          </div>
          {Array.from({length:4},(_,pi)=>(
            <div key={pi} style={{display:"grid",gridTemplateColumns:"1fr 48px 48px 56px",gap:4,padding:"6px 0",
              borderBottom:pi<3?"1px solid rgba(201,168,76,0.08)":"none",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:4,...gameFont,fontSize:11,color:PLAYER_COLORS[pi]}}>
                <span style={{fontSize:14}}>{PLAYER_ICONS[pi]}</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{names[pi]}</span>
              </div>
              <div style={{...gameFont,fontSize:12,color:"rgba(255,255,255,0.6)",textAlign:"center"}}>{frontT[pi]||"-"}</div>
              <div style={{...gameFont,fontSize:12,color:"rgba(255,255,255,0.6)",textAlign:"center"}}>{backT[pi]||"-"}</div>
              <div style={{...gameFont,fontSize:13,color:ranks[pi]===1?GOLD:IVORY,textAlign:"center",fontWeight:"bold"}}>{totalT[pi]||"-"}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>

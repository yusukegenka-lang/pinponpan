function buildCourses(raw){
  const groups={};
  raw.forEach(r=>{if(!groups[r.g])groups[r.g]=[];groups[r.g].push(r);});
  const out=[];
  Object.entries(groups).forEach(([g,rows])=>{
    if(rows.length===1){out.push({name:g,pars:[...rows[0].p,...rows[0].p]});}
    else if(rows.length===2){out.push({name:`${g}（${rows[0].c}→${rows[1].c}）`,pars:[...rows[0].p,...rows[1].p]});}
    else{for(let i=0;i<rows.length;i++)for(let j=0;j<rows.length;j++){if(i!==j)out.push({name:`${g}（${rows[i].c}→${rows[j].c}）`,pars:[...rows[i].p,...rows[j].p]});}}
  });
  return out;
}

function getTotal(s){return s.reduce((a,b)=>b!==""?a+Number(b):a,0);}
function getRank(t){const s=[...t].sort((a,b)=>a-b);return t.map(v=>s.indexOf(v)+1);}
function GoldLine(){return <div style={{height:1,background:`linear-gradient(90deg,transparent,${GOLD},transparent)`,margin:"12px 0"}}/>;}
function Btn({onClick,children,gold,disabled,outline}){
  const base={width:"100%",padding:"14px",borderRadius:12,...GF,fontSize:14,fontWeight:"bold",
    cursor:disabled?"not-allowed":"pointer",transition:"all 0.15s",border:"none"};
  const s=gold?{...base,background:disabled?"#555":`linear-gradient(135deg,${GOLD},#e8c56a)`,color:DARK,opacity:disabled?0.5:1}
    :outline?{...base,background:"transparent",border:`1px solid rgba(201,168,76,0.4)`,color:IVORY}
    :{...base,background:"rgba(255,255,255,0.08)",color:IVORY};
  return <button style={s} onClick={onClick} disabled={disabled}>{children}</button>;
}

function App(){
  useEffect(()=>{
    const fl=document.createElement("link");
    fl.href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@900&display=swap";
    fl.rel="stylesheet";
    if(!document.querySelector('link[href*="M+PLUS"]'))document.head.appendChild(fl);
  },[]);

  const [phase,setPhase]=useState("course");
  const [selectedCourse,setSelectedCourse]=useState(null);
  const [cName,setCName]=useState("");
  const [pars,setPars]=useState([...DEFAULT_PARS]);
  const [names,setNames]=useState(["プレイヤー1","プレイヤー2","プレイヤー3","プレイヤー4"]);
  const [scores,setScores]=useState(Array.from({length:4},()=>Array(18).fill("")));
  const [hole,setHole]=useState(0);
  const [pts,setPts]=useState({p1:3000,p2:1000,np:1500});
  const [nearpin,setNearpin]=useState({});
  const [showHelp,setShowHelp]=useState(false);
  const [sheetSearch,setSheetSearch]=useState("");
  const [customName,setCustomName]=useState("");
  const [sheetRaw,setSheetRaw]=useState(SHEET_RAW_DEFAULT);
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const allCourses=buildCourses(sheetRaw);

  async function syncSheet(){
    setSyncing(true); setSyncMsg("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:4000,
          messages:[{role:"user",content:`以下のGoogleスプレッドシートの内容をJSONで返してください。説明不要、JSON配列のみ返してください。\n\nhttps://docs.google.com/spreadsheets/d/1aZGkQAt2uh_xRM3_iKGIgLSnlYlFg5P4V95hxl8RBdI/edit\n\n形式：[{"g":"ゴルフ場名","c":"コース名","p":[H1,H2,H3,H4,H5,H6,H7,H8,H9]},...]`}]
        })
      });
      const data=await res.json();
      const text=data.content?.map(b=>b.text||"").join("")||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      if(!Array.isArray(parsed)||parsed.length===0)throw new Error("データが空");
      setSheetRaw(parsed);
      setSyncMsg(`✓ ${parsed.length}行を取得しました`);
    }catch(e){
      setSyncMsg("✗ 同期に失敗しました");
    }
    setSyncing(false);
  }

  const p3=-pts.p2, p4=-pts.p1, npLose=Math.round(pts.np/3);
  const par3Holes=pars.map((p,i)=>p===3?i:null).filter(i=>i!==null);
  const frontT=scores.map(s=>getTotal(s.slice(0,9)));
  const backT=scores.map(s=>getTotal(s.slice(9)));
  const totalT=scores.map(s=>getTotal(s));
  const ranks=getRank(totalT);
  const parF=pars.slice(0,9).reduce((a,b)=>a+b,0);
  const parB=pars.slice(9).reduce((a,b)=>a+b,0);
  const parTotal=parF+parB;
  const wrap={minHeight:"100vh",...BG,padding:"0 0 40px 0"};
  const inner={maxWidth:480,margin:"0 auto",padding:"0 16px"};

  function calcNearpin(){
    const pr=[0,0,0,0]; let carry=0;
    for(let i=0;i<par3Holes.length;i++){
      const h=par3Holes[i], w=nearpin[h];
      if(w===undefined)continue;
      if(w===null){if(i<par3Holes.length-1)carry++;}
      else{const m=carry+1;pr[w]+=pts.np*m;for(let pi=0;pi<4;pi++)if(pi!==w)pr[pi]-=npLose*m;carry=0;}
    }
    return pr;
  }

  function calcPrizes(totals){
    const s=[...totals].sort((a,b)=>a-b);
    if(s[0]===s[3])return[0,0,0,0];
    const top3=s[0]===s[1]&&s[1]===s[2],top2=!top3&&s[0]===s[1],mid2=!top3&&!top2&&s[1]===s[2],bot2=!top3&&!top2&&!mid2&&s[2]===s[3];
    const {p1,p2}=pts;
    const t=top3?[p1,p1,p1,-(p1*3)]:top2?[(p1+p2)/2,(p1+p2)/2,p3,p4]:mid2?[p1,(p2+p3)/2,(p2+p3)/2,p4]:bot2?[p1,p2,(p3+p4)/2,(p3+p4)/2]:[p1,p2,p3,p4];
    return totals.map(v=>t[s.indexOf(v)]);
  }

  function sc(pi,h,v){const val=v===""?"":(Math.max(1,parseInt(v)||1));setScores(prev=>{const n=prev.map(s=>[...s]);n[pi][h]=val;return n;});}
  function sp(h,v){setPars(prev=>{const n=[...prev];n[h]=Math.max(3,Math.min(5,parseInt(v)||4));return n;});}
  function pStr(v){return v>0?`+${v.toLocaleString()}pt`:`${v.toLocaleString()}pt`;}
  function pCol(v){return v>0?GOLD:v<0?"#f87171":"rgba(255,255,255,0.4)";}
  function selectCourse(course){setSelectedCourse(course);setCName(course.name);setPars([...course.pars]);}

  function Logo({sm}){
    return (
      <div style={{textAlign:"center",marginBottom:sm?16:28}}>
        <img src={LOGO_SRC} alt="PIN PON PAN" style={{width:sm?"65%":"85%",maxWidth:sm?240:340,height:"auto",display:"block",margin:"0 auto"}}/>
        {!sm&&<div style={{...GF,fontSize:9,color:"rgba(245,240,232,0.35)",letterSpacing:"0.2em",marginTop:6}}>GOLF SCORE TRACKER</div>}
      </div>
    );
  }

  // ── HELP ──
  if(showHelp) return (
    <div style={wrap}>
      <div style={inner}>
        <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(13,31,20,0.97)",backdropFilter:"blur(12px)",
          borderBottom:`1px solid rgba(201,168,76,0.2)`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{...GF,fontSize:16,color:GOLD}}>ヘルプ / ルール</span>
          <button onClick={()=>setShowHelp(false)} style={{...GF,fontSize:13,background:"rgba(255,255,255,0.08)",color:IVORY,
            border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>✕ 閉じる</button>
        </div>
        <div style={{padding:"20px 0 40px"}}>
          <div style={{...CARD,padding:18,marginBottom:14}}>
            <div style={{...GF,fontSize:13,color:GOLD,marginBottom:14}}>◆ 基本操作</div>
            {[{icon:"⛳",t:"コース設定",d:"コース名と各ホールのParを設定します。"},
              {icon:"🟢",t:"プレイヤー登録",d:"4人分の名前とポイントを設定します。"},
              {icon:"➕",t:"スコア入力",d:"＋／－でスコアを入力。最初からParが入力済みです。"},
              {icon:"🏠",t:"ホール移動",d:"上部のナビをタップで任意のホールへ移動できます。"},
            ].map(({icon,t,d})=>(
              <div key={t} style={{display:"flex",gap:12,marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(201,168,76,0.08)"}}>
                <span style={{fontSize:22,width:30,flexShrink:0}}>{icon}</span>
                <div><div style={{...GF,fontSize:13,color:IVORY,marginBottom:3}}>{t}</div>
                <div style={{...GF,fontSize:11,color:"rgba(245,240,232,0.5)",lineHeight:1.7}}>{d}</div></div>
              </div>
            ))}
          </div>
          <div style={{...CARD,padding:18,marginBottom:14}}>
            <div style={{...GF,fontSize:13,color:GOLD,marginBottom:12}}>◆ スコアポイントルール</div>
            <div style={{...GF,fontSize:11,color:"rgba(245,240,232,0.5)",marginBottom:10,lineHeight:1.7}}>前半・後半・トータルの3回、合計スコアで順位を競います。</div>
            {[{r:"1位",pt:`+${pts.p1.toLocaleString()}pt`,c:GOLD},{r:"2位",pt:`+${pts.p2.toLocaleString()}pt`,c:IVORY},
              {r:"3位",pt:`${p3.toLocaleString()}pt`,c:"#f87171"},{r:"4位",pt:`${p4.toLocaleString()}pt`,c:"#f87171"}
            ].map(({r,pt,c})=>(
              <div key={r} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",borderRadius:8,marginBottom:5,background:"rgba(255,255,255,0.04)"}}>
                <span style={{...GF,fontSize:12,color:"rgba(245,240,232,0.6)"}}>{r}</span>
                <span style={{...GF,fontSize:12,color:c,fontWeight:"bold"}}>{pt}</span>
              </div>
            ))}
            <div style={{...GF,fontSize:10,color:"rgba(245,240,232,0.35)",marginTop:8}}>※ 4人全員同スコアはポイントなし</div>
          </div>
          <div style={{...CARD,padding:18,marginBottom:14}}>
            <div style={{...GF,fontSize:13,color:GOLD,marginBottom:12}}>◆ ニアピン賞ルール</div>
            <div style={{...GF,fontSize:11,color:"rgba(245,240,232,0.5)",lineHeight:1.7,marginBottom:10}}>Par3のホールで1人がニアピン賞を獲得します。</div>
            {[{l:"WIN（獲得）",v:`+${pts.np.toLocaleString()}pt`,c:GOLD},{l:"LOSE（負担）",v:`-${npLose.toLocaleString()}pt × 3人`,c:"#f87171"}
            ].map(({l,v,c})=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",borderRadius:8,marginBottom:5,background:"rgba(255,255,255,0.04)"}}>
                <span style={{...GF,fontSize:12,color:"rgba(245,240,232,0.6)"}}>{l}</span>
                <span style={{...GF,fontSize:12,color:c,fontWeight:"bold"}}>{v}</span>
              </div>
            ))}
            <GoldLine/>
            <div style={{...GF,fontSize:11,color:"rgba(245,240,232,0.4)",lineHeight:1.8}}>
              該当なしの場合は次のPar3に持ち越し（×2〜×4倍）。4ホール全て該当なしはポイントなし。
            </div>
          </div>
          <div style={{...CARD,padding:18}}>
            <div style={{...GF,fontSize:13,color:GOLD,marginBottom:12}}>◆ スコア表示</div>
            {[{l:"EAGLE↓",bg:"rgba(201,168,76,0.25)",c:GOLD,d:"Par-2以下"},
              {l:"BIRDIE",bg:"rgba(239,68,68,0.25)",c:"#f87171",d:"Par-1"},
              {l:"PAR",bg:"rgba(255,255,255,0.1)",c:IVORY,d:"Par通り"},
              {l:"BOGEY",bg:"rgba(96,165,250,0.2)",c:"#93c5fd",d:"Par+1"},
              {l:"DBL",bg:"rgba(59,130,246,0.2)",c:"#60a5fa",d:"Par+2"},
            ].map(({l,bg,c,d})=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <span style={{...GF,fontSize:10,padding:"3px 10px",borderRadius:20,background:bg,color:c,border:`1px solid ${c}40`,minWidth:68,textAlign:"center"}}>{l}</span>
                <span style={{...GF,fontSize:11,color:"rgba(245,240,232,0.5)"}}>{d}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  // ── COURSE ──
  if(phase==="course") return (
    <div style={wrap}>
      <div style={inner}>
        <div style={{paddingTop:36}}><Logo/></div>

        <div style={{...CARD,padding:18,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{...GF,fontSize:13,color:GOLD}}>📊 コース一覧から選択</div>
            <button onClick={syncSheet} disabled={syncing}
              style={{...GF,fontSize:10,padding:"6px 12px",borderRadius:8,cursor:syncing?"not-allowed":"pointer",border:"none",
                background:syncing?"rgba(255,255,255,0.1)":`linear-gradient(135deg,${GOLD},#e8c56a)`,
                color:syncing?"rgba(255,255,255,0.4)":DARK,fontWeight:"bold"}}>
              {syncing?"同期中...":"🔄 最新に更新"}
            </button>
          </div>
          {syncMsg&&<div style={{...GF,fontSize:10,color:syncMsg.startsWith("✓")?"#4ade80":"#f87171",marginBottom:8}}>{syncMsg}</div>}
          <input value={sheetSearch} onChange={e=>setSheetSearch(e.target.value)} placeholder="ゴルフ場名で絞り込み..."
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.3)`,borderRadius:8,
              padding:"10px 14px",color:IVORY,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:10,...GF}}/>
          <div style={{maxHeight:260,overflowY:"auto"}}>
            {allCourses.filter(c=>!sheetSearch||c.name.includes(sheetSearch)).map((course,i)=>{
              const isSel=selectedCourse?.name===course.name;
              return (
                <button key={i} onClick={()=>selectCourse(course)}
                  style={{width:"100%",textAlign:"left",padding:"10px 12px",borderRadius:8,marginBottom:5,cursor:"pointer",
                    background:isSel?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.04)",
                    border:`1px solid ${isSel?"rgba(201,168,76,0.6)":"rgba(201,168,76,0.12)"}`,display:"block"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{...GF,fontSize:12,color:isSel?GOLD:IVORY}}>{course.name}</span>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{...GF,fontSize:10,color:"rgba(255,255,255,0.35)"}}>Par {course.pars.reduce((a,b)=>a+b,0)}</span>
                      {isSel&&<span style={{color:GOLD}}>✓</span>}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
          <div style={{...GF,fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:8}}>{allCourses.length}コース収録</div>
        </div>

        <div style={{...CARD,padding:18,marginBottom:16}}>
          <div style={{...GF,fontSize:13,color:GOLD,marginBottom:10}}>✏️ カスタム設定</div>
          <input value={customName} onChange={e=>setCustomName(e.target.value)} placeholder="コース名を入力"
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,
              padding:"10px 14px",color:IVORY,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:12,...GF}}/>
          {[{label:"前半（H1〜9）",range:[0,9]},{label:"後半（H10〜18）",range:[9,18]}].map(({label,range})=>(
            <div key={label} style={{marginBottom:10}}>
              <div style={{...GF,fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:6}}>{label}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {pars.slice(range[0],range[1]).map((p,i)=>{
                  const hi=range[0]+i;
                  const col=p===3?GOLD:p===5?"#60a5fa":IVORY;
                  return (
                    <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",...GF}}>{hi+1}</span>
                      <select value={p} onChange={e=>sp(hi,e.target.value)}
                        style={{width:36,height:34,background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,
                          borderRadius:6,color:col,fontSize:13,textAlign:"center",...GF,outline:"none"}}>
                        <option value={3}>3</option><option value={4}>4</option><option value={5}>5</option>
                      </select>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{textAlign:"right",...GF,fontSize:10,color:"rgba(201,168,76,0.5)"}}>FRONT {parF} | BACK {parB} | TOTAL {parTotal}</div>
          <div style={{marginTop:10}}>
            <Btn onClick={()=>{const n=customName||"カスタムコース";setSelectedCourse({name:n,pars:[...pars]});setCName(n);}}>
              このPar設定を使う
            </Btn>
          </div>
        </div>

        <Btn gold disabled={!selectedCourse} onClick={()=>setPhase("setup")}>
          {selectedCourse?`次へ → ${selectedCourse.name}`:"コースを選択してください"}
        </Btn>
      </div>
    </div>
  );

  // ── SETUP ──
  if(phase==="setup") return (
    <div style={wrap}>
      <div style={inner}>
        <div style={{paddingTop:32}}>
          <button onClick={()=>setPhase("course")} style={{...GF,fontSize:11,color:"rgba(201,168,76,0.5)",background:"none",border:"none",cursor:"pointer",marginBottom:12}}>← コース選択に戻る</button>
          <Logo sm/>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{...GF,fontSize:11,color:"rgba(245,240,232,0.4)"}}>{cName} | PAR {parTotal}</div>
          </div>
        </div>

        <div style={{...CARD,padding:20,marginBottom:16}}>
          <div style={{...GF,fontSize:13,color:GOLD,marginBottom:14}}>◆ プレイヤー登録</div>
          {names.map((name,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:20,width:26}}>{PLAYER_ICONS[i]}</span>
              <input value={name} onChange={e=>setNames(p=>{const n=[...p];n[i]=e.target.value;return n;})} placeholder={`PLAYER ${i+1}`}
                style={{flex:1,background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,
                  padding:"10px 14px",color:PLAYER_COLORS[i],fontSize:13,outline:"none",...GF,boxSizing:"border-box"}}/>
            </div>
          ))}
        </div>

        <div style={{...CARD,padding:20,marginBottom:16}}>
          <div style={{...GF,fontSize:13,color:GOLD,marginBottom:14}}>◆ ポイント設定</div>
          {[{key:"p1",label:"1位"},{key:"p2",label:"2位"},{key:"np",label:"ニアピン WIN"}].map(({key,label})=>(
            <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{...GF,fontSize:12,color:"rgba(245,240,232,0.6)"}}>{label}</span>
              <input type="number" value={pts[key]} onChange={e=>setPts(p=>({...p,[key]:parseInt(e.target.value)||0}))}
                style={{width:100,background:"rgba(255,255,255,0.06)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,
                  padding:"8px 10px",color:pts[key]>=0?GOLD:"#f87171",fontSize:13,outline:"none",textAlign:"right",...GF,boxSizing:"border-box"}}/>
            </div>
          ))}
          {[{label:"3位（自動）",val:p3},{label:"4位（自動）",val:p4},{label:"ニアピン LOSE（自動）",val:-npLose}].map(({label,val})=>(
            <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",borderRadius:8,marginBottom:5,
              background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
              <span style={{...GF,fontSize:11,color:"rgba(245,240,232,0.3)"}}>{label}</span>
              <span style={{...GF,fontSize:11,color:"#f87171"}}>{val.toLocaleString()}pt</span>
            </div>
          ))}
        </div>

        <Btn gold onClick={()=>{setScores(Array.from({length:4},()=>pars.map(p=>p)));setNearpin({});setHole(0);setPhase("playing");}}>
          ▶ ラウンド スタート
        </Btn>
      </div>
    </div>
  );

  // ── RESULT ──
  if(phase==="result"){
    const fP=calcPrizes(frontT),bP=calcPrizes(backT),tP=calcPrizes(totalT),nP=calcNearpin();
    const grand=Array.from({length:4},(_,i)=>fP[i]+bP[i]+tP[i]+nP[i]);
    const byGrand=[...Array(4).keys()].sort((a,b)=>grand[b]-grand[a]);
    const sections=[{label:"FRONT 9",sc:frontT,pr:fP},{label:"BACK 9",sc:backT,pr:bP},{label:"TOTAL",sc:totalT,pr:tP}];
    const nearpinRows=par3Holes.map((h,idx)=>{
      let carry=0;
      for(let j=idx-1;j>=0;j--){if(nearpin[par3Holes[j]]===null)carry++;else break;}
      return{holeNum:h+1,winner:nearpin[h],mult:carry+1};
    });
    return (
      <div style={wrap}>
        <div style={inner}>
          <div style={{paddingTop:32}}><Logo sm/></div>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:40}}>🏆</div>
            <div style={{...GF,fontSize:18,color:GOLD}}>FINAL RESULT</div>
            <div style={{...GF,fontSize:10,color:"rgba(245,240,232,0.4)"}}>{cName} | PAR {parTotal}</div>
            <GoldLine/>
          </div>
          {sections.map(({label,sc,pr})=>{
            const si=[...Array(4).keys()].sort((a,b)=>sc[a]-sc[b]);
            return (
              <div key={label} style={{...CARD,padding:16,marginBottom:12}}>
                <div style={{...GF,fontSize:12,color:GOLD,marginBottom:10}}>◆ {label}</div>
                {si.map((pi,rank)=>(
                  <div key={pi} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:rank<3?"1px solid rgba(201,168,76,0.08)":"none"}}>
                    <span style={{fontSize:16,width:26,textAlign:"center"}}>{medals[rank]}</span>
                    <span style={{fontSize:16}}>{PLAYER_ICONS[pi]}</span>
                    <span style={{flex:1,...GF,fontSize:12,color:PLAYER_COLORS[pi]}}>{names[pi]}</span>
                    <span style={{...GF,fontSize:12,color:"rgba(255,255,255,0.4)",width:28,textAlign:"right"}}>{sc[pi]||"-"}</span>
                    <span style={{...GF,fontSize:12,color:pCol(pr[pi]),width:100,textAlign:"right",fontWeight:"bold"}}>{pStr(pr[pi])}</span>
                  </div>
                ))}
              </div>
            );
          })}
          <div style={{...CARD,padding:16,marginBottom:12}}>
            <div style={{...GF,fontSize:12,color:GOLD,marginBottom:10}}>◆ NEARPIN</div>
            {nearpinRows.map(({holeNum,winner,mult})=>(
              <div key={holeNum} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(201,168,76,0.08)"}}>
                <span style={{...GF,fontSize:10,color:"rgba(255,255,255,0.4)",width:52}}>HOLE {holeNum}</span>
                {mult>1&&<span style={{...GF,fontSize:9,color:"#f87171",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:4,padding:"2px 5px"}}>×{mult}</span>}
                {winner===undefined?<span style={{...GF,fontSize:10,color:"rgba(255,255,255,0.2)"}}>未入力</span>
                  :winner===null?<span style={{...GF,fontSize:10,color:"rgba(255,255,255,0.35)"}}>該当なし→持ち越し</span>
                  :<><span style={{fontSize:16}}>{PLAYER_ICONS[winner]}</span>
                    <span style={{...GF,fontSize:11,color:PLAYER_COLORS[winner]}}>{names[winner]}</span>
                    <span style={{...GF,fontSize:11,color:GOLD,marginLeft:"auto"}}>+{(pts.np*mult).toLocaleString()}pt</span></>}
              </div>
            ))}
            <div style={{marginTop:10}}>
              {Array.from({length:4},(_,pi)=>nP[pi]!==0&&(
                <div key={pi} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
                  <span style={{...GF,fontSize:11,color:PLAYER_COLORS[pi]}}>{PLAYER_ICONS[pi]} {names[pi]}</span>
                  <span style={{...GF,fontSize:11,color:pCol(nP[pi]),fontWeight:"bold"}}>{pStr(nP[pi])}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{...CARD_GOLD,padding:20,marginBottom:20}}>
            <div style={{...GF,fontSize:12,color:GOLD,marginBottom:14}}>◆ POINT TOTAL</div>
            {byGrand.map((pi,rank)=>(
              <div key={pi} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,marginBottom:6,
                background:rank===0?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)"}}>
                <span style={{fontSize:rank===0?24:18,width:30}}>{["🥇","🥈","🥉","4位"][rank]}</span>
                <span style={{fontSize:18}}>{PLAYER_ICONS[pi]}</span>
                <span style={{flex:1,...GF,fontSize:13,color:PLAYER_COLORS[pi]}}>{names[pi]}</span>
                <div style={{textAlign:"right"}}>
                  <div style={{...GF,fontSize:16,color:pCol(grand[pi]),fontWeight:"bold"}}>{pStr(grand[pi])}</div>
                  <div style={{...GF,fontSize:9,color:"rgba(255,255,255,0.3)"}}>{pStr(fP[pi])}/{pStr(bP[pi])}/{pStr(tP[pi])}/NP:{pStr(nP[pi])}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}><Btn outline onClick={()=>setPhase("playing")}>← スコア入力</Btn></div>
            <div style={{flex:1}}><Btn gold onClick={()=>{setScores(Array.from({length:4},()=>pars.map(p=>p)));setNearpin({});setSelectedCourse(null);setPhase("course");setHole(0);}}>もう一度</Btn></div>
          </div>
        </div>
      </div>
    );
  }

  // ── PLAYING ──
  const par=pars[hole], isHalf=hole<9?"FRONT":"BACK";
  return (
    <div style={{...wrap,paddingBottom:0}}>
      <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(13,31,20,0.95)",backdropFilter:"blur(12px)",
        borderBottom:`1px solid rgba(201,168,76,0.2)`,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{...GF,fontSize:9,color:"rgba(201,168,76,0.6)",marginBottom:3}}>{isHalf} · {cName}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{...GF,fontSize:20,color:IVORY}}>HOLE {hole+1}</span>
            <span style={{...GF,fontSize:11,color:"rgba(201,168,76,0.7)"}}>PAR {par}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowHelp(true)} style={{...GF,fontSize:13,background:"rgba(255,255,255,0.08)",color:"rgba(201,168,76,0.7)",
            border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,padding:"8px 12px",cursor:"pointer"}}>？</button>
          <button onClick={()=>setPhase("course")} style={{...GF,fontSize:11,background:"rgba(255,255,255,0.08)",color:"rgba(201,168,76,0.7)",
            border:`1px solid rgba(201,168,76,0.25)`,borderRadius:8,padding:"8px 12px",cursor:"pointer"}}>← 設定</button>
          <button onClick={()=>setPhase("result")} style={{...GF,fontSize:11,background:`linear-gradient(135deg,${GOLD},#e8c56a)`,
            color:DARK,border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:"bold"}}>結果 →</button>
        </div>
      </div>

      <div style={{...inner,paddingTop:16}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:16}}>
          {Array.from({length:18},(_,i)=>{
            const isCur=i===hole,edited=scores.some(s=>s[i]!==pars[i])||(pars[i]===3&&nearpin[i]!==undefined);
            return <button key={i} onClick={()=>setHole(i)}
              style={{width:32,height:32,borderRadius:6,fontSize:11,fontWeight:"bold",cursor:"pointer",...GF,border:"none",
                marginLeft:i===9?8:0,transition:"all 0.15s",
                background:isCur?`linear-gradient(135deg,${GOLD},#e8c56a)`:edited?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.06)",
                color:isCur?DARK:edited?GOLD:"rgba(255,255,255,0.35)",transform:isCur?"scale(1.15)":"scale(1)"}}>
              {i+1}</button>;
          })}
        </div>

        <div style={{...CARD,padding:16,marginBottom:14}}>
          <div style={{...GF,fontSize:10,color:GOLD,letterSpacing:"0.15em",marginBottom:14}}>◆ スコア入力</div>
          {Array.from({length:4},(_,pi)=>{
            const val=scores[pi][hole],diff=val!==""?Number(val)-par:null;
            const bi=diff===null?null:diff<=-2?{l:"EAGLE↓",bg:"rgba(201,168,76,0.25)",c:GOLD}:diff===-1?{l:"BIRDIE",bg:"rgba(239,68,68,0.25)",c:"#f87171"}:diff===0?{l:"PAR",bg:"rgba(255,255,255,0.1)",c:IVORY}:diff===1?{l:"BOGEY",bg:"rgba(96,165,250,0.2)",c:"#93c5fd"}:diff===2?{l:"DBL",bg:"rgba(59,130,246,0.2)",c:"#60a5fa"}:{l:`+${diff}`,bg:"rgba(30,58,138,0.3)",c:"#818cf8"};
            return (
              <div key={pi} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:pi<3?"1px solid rgba(201,168,76,0.08)":"none"}}>
                <span style={{fontSize:18,width:26}}>{PLAYER_ICONS[pi]}</span>
                <span style={{flex:1,...GF,fontSize:12,color:PLAYER_COLORS[pi]}}>{names[pi]}</span>
                {bi&&<span style={{...GF,fontSize:9,padding:"3px 7px",borderRadius:20,background:bi.bg,color:bi.c,border:`1px solid ${bi.c}40`}}>{bi.l}</span>}
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>sc(pi,hole,val===""?par-1:Math.max(1,Number(val)-1))}
                    style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:`1px solid rgba(201,168,76,0.2)`,
                      color:IVORY,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <span style={{width:28,textAlign:"center",...GF,fontSize:18,color:val===""?"rgba(255,255,255,0.2)":IVORY,fontWeight:"bold"}}>{val||"-"}</span>
                  <button onClick={()=>sc(pi,hole,val===""?par+1:Number(val)+1)}
                    style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:`1px solid rgba(201,168,76,0.2)`,
                      color:IVORY,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>
            );
          })}
        </div>

        {par===3&&(()=>{
          const sel=nearpin[hole],hIdx=par3Holes.indexOf(hole);
          let carry=0;for(let j=hIdx-1;j>=0;j--){if(nearpin[par3Holes[j]]===null)carry++;else break;}
          const mult=carry+1;
          return (
            <div style={{...CARD_GOLD,padding:16,marginBottom:14}}>
              <div style={{...GF,fontSize:10,color:GOLD,marginBottom:4}}>◆ NEARPIN {mult>1?`× ${mult} (持ち越し${carry}回)`:""}</div>
              <div style={{...GF,fontSize:9,color:"rgba(255,255,255,0.35)",marginBottom:12}}>WIN: +{(pts.np*mult).toLocaleString()}pt / LOSE: -{(npLose*mult).toLocaleString()}pt</div>
              <div style={{display:"flex",gap:6}}>
                {Array.from({length:4},(_,pi)=>{
                  const isSel=sel===pi;
                  return <button key={pi} onClick={()=>setNearpin(p=>({...p,[hole]:isSel?undefined:pi}))}
                    style={{flex:1,padding:"10px 4px",borderRadius:10,cursor:"pointer",border:`2px solid ${isSel?PLAYER_COLORS[pi]:"rgba(255,255,255,0.1)"}`,
                      background:isSel?`${PLAYER_COLORS[pi]}22`:"rgba(255,255,255,0.04)",
                      display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <span style={{fontSize:20}}>{PLAYER_ICONS[pi]}</span>
                    <span style={{...GF,fontSize:9,color:isSel?PLAYER_COLORS[pi]:"rgba(255,255,255,0.4)"}}>{names[pi].slice(0,4)}</span>
                  </button>;
                })}
              </div>
              <button onClick={()=>setNearpin(p=>({...p,[hole]:sel===null?undefined:null}))}
                style={{width:"100%",marginTop:10,padding:"8px",borderRadius:8,cursor:"pointer",
                  border:`1px solid ${sel===null?"rgba(248,113,113,0.6)":"rgba(255,255,255,0.1)"}`,
                  background:sel===null?"rgba(248,113,113,0.1)":"rgba(255,255,255,0.03)",
                  ...GF,fontSize:10,color:sel===null?"#f87171":"rgba(255,255,255,0.35)"}}>
                該当なし（持ち越し）
              </button>
            </div>
          );
        })()}

        <div style={{display:"flex",gap:10,marginBottom:14}}>
          <div style={{flex:1}}><Btn outline disabled={hole===0} onClick={()=>setHole(h=>Math.max(0,h-1))}>← PREV</Btn></div>
          <div style={{flex:1}}><Btn gold onClick={()=>{if(hole<17)setHole(h=>h+1);else setPhase("result");}}>
            {hole<17?"NEXT →":"RESULT 🏆"}
          </Btn></div>
        </div>

        <div style={{...CARD,padding:14,marginBottom:24}}>
          <div style={{...GF,fontSize:10,color:GOLD,marginBottom:10}}>◆ 現在のスコア</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 48px 48px 56px",gap:4,marginBottom:6}}>
            {["","FRONT","BACK","TOTAL"].map(h=><div key={h} style={{...GF,fontSize:9,color:"rgba(255,255,255,0.3)",textAlign:h?"center":"left"}}>{h}</div>)}
          </div>
          {Array.from({length:4},(_,pi)=>(
            <div key={pi} style={{display:"grid",gridTemplateColumns:"1fr 48px 48px 56px",gap:4,padding:"6px 0",
              borderBottom:pi<3?"1px solid rgba(201,168,76,0.08)":"none",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:4,...GF,fontSize:11,color:PLAYER_COLORS[pi]}}>
                <span style={{fontSize:14}}>{PLAYER_ICONS[pi]}</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{names[pi]}</span>
              </div>
              <div style={{...GF,fontSize:12,color:"rgba(255,255,255,0.6)",textAlign:"center"}}>{frontT[pi]||"-"}</div>
              <div style={{...GF,fontSize:12,color:"rgba(255,255,255,0.6)",textAlign:"center"}}>{backT[pi]||"-"}</div>
              <div style={{...GF,fontSize:13,color:ranks[pi]===1?GOLD:IVORY,textAlign:"center",fontWeight:"bold"}}>{totalT[pi]||"-"}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
